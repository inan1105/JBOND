<script>
"use strict";
/* ============================================================
   bond-engine 포트 (순수 계산) — TS packages/bond-engine 대응
   ============================================================ */
const DAY = 86400000;
function pd(iso){ const [y,m,d]=iso.split("-").map(Number); return Date.UTC(y,m-1,d); }
function diffDays(a,b){ return Math.round((b-a)/DAY); }
function isLeap(y){ return (y%4===0&&y%100!==0)||y%400===0; }
function addMonths(t, months){
  const d=new Date(t); const y=d.getUTCFullYear(), m=d.getUTCMonth(), day=d.getUTCDate();
  const tg=new Date(Date.UTC(y,m+months,1));
  const last=new Date(Date.UTC(tg.getUTCFullYear(),tg.getUTCMonth()+1,0)).getUTCDate();
  tg.setUTCDate(Math.min(day,last)); return tg.getTime();
}
function yearFrac(a,b,dc){
  if(b<=a) return 0;
  if(dc==="ACT_360") return diffDays(a,b)/360;
  if(dc==="ACT_ACT"){
    let tot=0; const ya=new Date(a).getUTCFullYear(), yb=new Date(b).getUTCFullYear();
    for(let y=ya;y<=yb;y++){ const s=Date.UTC(y,0,1), e=Date.UTC(y+1,0,1);
      const ss=Math.max(a,s), ee=Math.min(b,e); if(ee<=ss) continue;
      tot += diffDays(ss,ee)/(isLeap(y)?366:365); } return tot;
  }
  return diffDays(a,b)/365; // ACT_365 default
}
function trunc1(x){ return Math.trunc(Number((x*10).toPrecision(15)))/10; }

function schedule(t){ // t: bond terms
  const face=t.pricingFaceValue, prin=face*(t.redemptionRate/100);
  const iss=pd(t.issueDate), mat=pd(t.maturityDate);
  const life=yearFrac(iss,mat,t.dayCount), f=t.couponFrequency||1, cr=(t.couponRate||0)/100;
  if(t.bondType==="DISCOUNT") return [{date:t.maturityDate, principal:prin, interest:0}];
  if(t.bondType==="SIMPLE_COMPOUND") return [{date:t.maturityDate, principal:prin, interest:face*cr*life}];
  if(t.bondType==="COMPOUND"){ const mv=face*Math.pow(1+cr/f, f*life); return [{date:t.maturityDate, principal:prin, interest:mv-face}]; }
  // FIXED_COUPON
  const mpp=12/f, coup=face*cr/f, dates=[]; let cur=mat;
  while(cur>iss){ dates.push(cur); cur=addMonths(cur,-mpp); }
  dates.reverse();
  return dates.map(dt=>{ const iso=new Date(dt).toISOString().slice(0,10);
    return {date:iso, principal: iso===t.maturityDate?prin:0, interest:coup}; });
}
function accrued(t, valIso){
  if(t.bondType!=="FIXED_COUPON") return 0;
  const f=t.couponFrequency||1, mpp=12/f, coup=t.pricingFaceValue*(t.couponRate/100)/f;
  const val=pd(valIso), iss=pd(t.issueDate), mat=pd(t.maturityDate);
  let next=mat, prev=addMonths(mat,-mpp);
  while(prev>val && prev>iss){ next=prev; prev=addMonths(prev,-mpp); }
  if(prev<iss) prev=iss; if(val<=prev) return 0;
  const pf=yearFrac(prev,next,t.dayCount), af=yearFrac(prev,val,t.dayCount);
  return pf<=0?0:coup*(af/pf);
}
function priceBond(t, valIso, yld){
  const f=t.couponFrequency||1, y=yld/100, val=pd(valIso);
  const cfs=schedule(t).filter(c=>pd(c.date)>val).map(c=>{
    const tt=yearFrac(val,pd(c.date),t.dayCount), df=1/Math.pow(1+y/f, f*tt), total=c.principal+c.interest;
    return {...c, t:tt, df, pv:total*df, total};
  });
  const dirtyRaw=cfs.reduce((s,c)=>s+c.pv,0);
  const acc=trunc1(accrued(t,valIso)); const dirty=trunc1(dirtyRaw); const clean=trunc1(dirty-acc);
  return { clean, dirty, accrued:acc, cfs, remainingDays:Math.max(0,diffDays(val,pd(t.maturityDate))) };
}
function simulate(t, aIso, aY, bIso, bY, qty, taxRate){
  const A=priceBond(t,aIso,aY), B=priceBond(t,bIso,bY);
  const a=pd(aIso), b=pd(bIso);
  const income=schedule(t).filter(c=>pd(c.date)>a && pd(c.date)<=b).reduce((s,c)=>s+c.principal+c.interest,0)*qty;
  const invest=A.dirty*qty, proceeds=B.dirty*qty;
  const capital=(B.clean-A.clean)*qty;
  const tax=Math.max(0, income*(taxRate/100));
  const profit=income+capital-tax;
  const tr=invest?profit/invest:0;
  const hold=Math.max(1,diffDays(a,b));
  const cagr=(invest>0&&invest+profit>0)?Math.pow((invest+profit)/invest,365/hold)-1:0;
  return {A,B,invest,proceeds,income,capital,tax,profit,tr,cagr,hold};
}
function sensitivity(t,aIso,aY,bIso,bY,qty,taxRate){
  return [-100,-75,-50,-25,0,25,50,75,100].map(bp=>{
    const r=simulate(t,aIso,aY,bIso,bY+bp/100,qty,taxRate);
    return {bp, y:bY+bp/100, clean:r.B.clean, capital:r.capital, tr:r.tr*100, cagr:r.cagr*100};
  });
}

/* ============================================================
   Mock 데이터 (apps/web/src/data/mock.ts 대응)
   ============================================================ */
const AS_OF="2026-07-23";
const MASTERS=[
  {id:"KR103501GA34",isin:"KR103501GA34",code:"국고03500-3403",name:"국고채권 03500-3403(24-2)",cat:"국채",rating:"AAA"},
  {id:"KR6000CORPAA",isin:"KR6000CORPAA",code:"회사AA0-2701",name:"(주)본드전자 12 회사채",cat:"회사채",rating:"AA0"},
  {id:"KR2000MONE01",isin:"KR2000MONE01",code:"통안0250-2601",name:"통화안정증권 02500-2601",cat:"통안채",rating:"AAA"},
  {id:"KR3000COMPD1",isin:"KR3000COMPD1",code:"지역개발복리-2901",name:"지역개발채권(복리) 03000-2901",cat:"지방채",rating:"AA+"},
  {id:"KR4000SIMPLE",isin:"KR4000SIMPLE",code:"금융단리-2801",name:"본드은행 단리채 04000-2801",cat:"은행채",rating:"AAA"},
];
const TERMS={
  KR103501GA34:{bondId:"KR103501GA34",typeLabel:"고정금리 이표채",pricingFaceValue:10000,currency:"KRW",issueDate:"2024-03-10",maturityDate:"2034-03-10",bondType:"FIXED_COUPON",couponRate:3.5,issueYield:3.52,couponFrequency:2,dayCount:"ACT_365",redemptionType:"BULLET",redemptionRate:100,pay:"후급",issuer:"대한민국정부"},
  KR6000CORPAA:{bondId:"KR6000CORPAA",typeLabel:"고정금리 이표채",pricingFaceValue:10000,currency:"KRW",issueDate:"2024-07-01",maturityDate:"2027-07-01",bondType:"FIXED_COUPON",couponRate:4.2,issueYield:4.25,couponFrequency:4,dayCount:"ACT_365",redemptionType:"BULLET",redemptionRate:100,pay:"후급",issuer:"본드전자"},
  KR2000MONE01:{bondId:"KR2000MONE01",typeLabel:"할인채",pricingFaceValue:10000,currency:"KRW",issueDate:"2025-01-15",maturityDate:"2026-01-15",bondType:"DISCOUNT",couponRate:null,issueYield:2.9,couponFrequency:1,dayCount:"ACT_365",redemptionType:"BULLET",redemptionRate:100,pay:"만기일시",issuer:"한국은행"},
  KR3000COMPD1:{bondId:"KR3000COMPD1",typeLabel:"복리채",pricingFaceValue:10000,currency:"KRW",issueDate:"2024-01-02",maturityDate:"2029-01-02",bondType:"COMPOUND",couponRate:3.0,issueYield:3.0,couponFrequency:1,dayCount:"ACT_365",redemptionType:"BULLET",redemptionRate:100,pay:"만기일시",issuer:"서울특별시"},
  KR4000SIMPLE:{bondId:"KR4000SIMPLE",typeLabel:"단리채",pricingFaceValue:10000,currency:"KRW",issueDate:"2024-01-02",maturityDate:"2028-01-02",bondType:"SIMPLE_COMPOUND",couponRate:3.8,issueYield:3.8,couponFrequency:1,dayCount:"ACT_365",redemptionType:"BULLET",redemptionRate:100,pay:"만기일시",issuer:"본드은행"},
};
function seeded(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=>{ s=(s*16807)%2147483647; return (s-1)/2147483646; }; }
function observations(id, days){
  const t=TERMS[id]; const base=t.issueYield||t.couponRate||3;
  const rnd=seeded([...id].reduce((a,c)=>a+c.charCodeAt(0),0)); const out=[]; let y=base;
  const to=pd(AS_OF), from=to-days*DAY;
  for(let tt=from; tt<=to; tt+=DAY){ const d=new Date(tt), dow=d.getUTCDay(); if(dow===0||dow===6) continue;
    y+=(rnd()-.5)*.04; y=Math.max(.5,y); const iso=d.toISOString().slice(0,10);
    const hasTrade=rnd()>.55; const p=priceBond(t,iso,Number(y.toFixed(3)));
    out.push({date:iso, yield:Number(y.toFixed(3)), clean:p.clean, vol:hasTrade?Math.round(rnd()*5000)*100:null}); }
  return out;
}
const CURVES={
  GOVERNMENT:{label:"국채",base:2.9,slope:.9,rating:null},
  MONETARY:{label:"통안채",base:2.85,slope:.5,rating:null},
  LOCAL:{label:"지방채",base:3.1,slope:.95,rating:"AA+"},
  BANK:{label:"은행채 AAA",base:3.25,slope:.9,rating:"AAA"},
  CORPORATE_AA0:{label:"회사채 AA0",base:3.6,slope:1.0,rating:"AA0"},
  CORPORATE_A0:{label:"회사채 A0",base:4.4,slope:1.15,rating:"A0"},
  CORPORATE_BBB:{label:"회사채 BBB",base:6.5,slope:1.4,rating:"BBB"},
};
const CT=[{l:"3M",y:.25},{l:"6M",y:.5},{l:"1Y",y:1},{l:"2Y",y:2},{l:"3Y",y:3},{l:"5Y",y:5},{l:"10Y",y:10},{l:"20Y",y:20},{l:"30Y",y:30}];
function curve(cid, dateShiftDays){
  const c=CURVES[cid]||CURVES.GOVERNMENT;
  const rnd=seeded([...cid].reduce((a,x)=>a+x.charCodeAt(0),0)+dateShiftDays);
  return CT.map((tn,i)=>{ const missing=(tn.l==="2Y"&&cid.startsWith("CORPORATE"));
    const drift=dateShiftDays*0.0009;
    const y=c.base+c.slope*Math.log1p(tn.y)*.6+(rnd()-.5)*.05 - drift;
    return {l:tn.l, y:tn.y, yield:missing?null:Number(y.toFixed(3)), interp:missing}; });
}
const MTM_ROWS=[
  {k:"GOV",l:"국고채",b:2.9,s:.9,q:1},{k:"MSB",l:"통안채",b:2.85,s:.5,q:1},
  {k:"LOCAL",l:"지방채",b:3.1,s:.95},{k:"SPECIAL",l:"특수채 AAA",b:3.15,s:.95},
  {k:"BANK",l:"은행채 AAA",b:3.25,s:.9},{k:"FIN",l:"금융채 AA",b:3.45,s:.95},
  {k:"CARD",l:"카드채 AA",b:3.55,s:1.0},{k:"CAP",l:"캐피탈채 AA",b:3.7,s:1.05},
  {k:"CAAA",l:"회사채 AAA",b:3.4,s:1.0},{k:"CAAp",l:"회사채 AA+",b:3.5,s:1.0},
  {k:"CAA0",l:"회사채 AA0",b:3.6,s:1.0},{k:"CAAm",l:"회사채 AA-",b:3.75,s:1.05},
  {k:"CAp",l:"회사채 A+",b:4.1,s:1.1},{k:"CA0",l:"회사채 A0",b:4.4,s:1.15},
  {k:"CAm",l:"회사채 A-",b:4.8,s:1.2},{k:"CBBB",l:"회사채 BBB",b:6.5,s:1.4},
];
const MTM_T=[{l:"3M",y:.25},{l:"6M",y:.5},{l:"1Y",y:1},{l:"3Y",y:3},{l:"5Y",y:5},{l:"10Y",y:10},{l:"30Y",y:30}];
function mtm(){
  const rnd=seeded(99); const grid={};
  for(const r of MTM_ROWS){ grid[r.k]={};
    for(const tn of MTM_T){ const missing=(r.k==="MSB"&&tn.l==="30Y");
      const y=r.b+r.s*Math.log1p(tn.y)*.6+(rnd()-.5)*.04; const change=(rnd()-.5)*12;
      const vt=(r.k==="GOV"||r.k==="MSB")?"quote":(rnd()>.5?"mtm":"quote");
      grid[r.k][tn.l]= missing?{miss:true}:{yield:Number(y.toFixed(3)),bp:Number(change.toFixed(1)),vt}; } }
  return grid;
}

function fRem(days){ if(days==null||days<0)return"—"; const y=Math.floor(days/365),m=Math.floor(days%365/30); return y>0?`${y}년 ${m}개월`:`${m}개월`; }

function lineChart(obs){
  const W=350,H=180,pl=38,pr=38,pt=14,pb=22;
  const ys=obs.map(o=>o.yield), ps=obs.map(o=>o.clean);
  const ymin=Math.min(...ys),ymax=Math.max(...ys),pmin=Math.min(...ps),pmax=Math.max(...ps);
  const xat=i=> pl+(W-pl-pr)*i/(obs.length-1);
  const yY=v=> pt+(H-pt-pb)*(1-(v-ymin)/((ymax-ymin)||1));
  const yP=v=> pt+(H-pt-pb)*(1-(v-pmin)/((pmax-pmin)||1));
  const dY=obs.map((o,i)=>`${i?"L":"M"}${xat(i).toFixed(1)},${yY(o.yield).toFixed(1)}`).join("");
  const dP=obs.map((o,i)=>`${i?"L":"M"}${xat(i).toFixed(1)},${yP(o.clean).toFixed(1)}`).join("");
  const bars=obs.map((o,i)=> o.vol?`<rect x="${(xat(i)-1).toFixed(1)}" y="${(H-pb-(o.vol/600000)*22).toFixed(1)}" width="2" height="${((o.vol/600000)*22).toFixed(1)}" fill="var(--faint)" opacity=".5"/>`:"").join("");
  const last=obs[obs.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="수익률·가격 추이">
    ${bars}
    <path d="${dP}" fill="none" stroke="var(--down)" stroke-width="1.6"/>
    <path d="${dY}" fill="none" stroke="var(--up)" stroke-width="1.6"/>
    <circle cx="${xat(obs.length-1).toFixed(1)}" cy="${yY(last.yield).toFixed(1)}" r="3" fill="var(--up)"/>
    <circle cx="${xat(obs.length-1).toFixed(1)}" cy="${yP(last.clean).toFixed(1)}" r="3" fill="var(--down)"/>
    <text x="${pl}" y="10" font-size="8" fill="var(--up)">수익률 ${fY(last.yield)}</text>
    <text x="${W-pr}" y="10" font-size="8" fill="var(--down)" text-anchor="end">단가 ${fP(last.clean)}</text>
  </svg>`;
}
function curveChart(series){
  const W=350,H=190,pl=36,pr=14,pt=16,pb=26;
  const all=series.flatMap(s=>s.pts.map(p=>p.yield).filter(v=>v!=null));
  const ymin=Math.min(...all),ymax=Math.max(...all);
  const xs=CT, xat=i=> pl+(W-pl-pr)*i/(xs.length-1);
  const yv=v=> pt+(H-pt-pb)*(1-(v-ymin)/((ymax-ymin)||1));
  let out=`<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="수익률곡선">`;
  // grid
  for(let g=0;g<=4;g++){ const yy=pt+(H-pt-pb)*g/4; out+=`<line x1="${pl}" y1="${yy}" x2="${W-pr}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>`; }
  xs.forEach((t,i)=> out+=`<text x="${xat(i)}" y="${H-8}" font-size="8" fill="var(--faint)" text-anchor="middle">${t.l}</text>`);
  out+=`<text x="6" y="${pt+6}" font-size="8" fill="var(--faint)">${ymax.toFixed(2)}</text><text x="6" y="${H-pb}" font-size="8" fill="var(--faint)">${ymin.toFixed(2)}</text>`;
  for(const s of series){
    let d="",segStart=true;
    s.pts.forEach((p,i)=>{ if(p.yield==null){segStart=true;return;} d+=`${segStart?"M":"L"}${xat(i).toFixed(1)},${yv(p.yield).toFixed(1)}`; segStart=false; });
    out+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2" ${s.dash?'stroke-dasharray="4 3"':""}/>`;
    s.pts.forEach((p,i)=>{ if(p.yield==null){ out+=`<text x="${xat(i)}" y="${H-pb-2}" font-size="9" fill="var(--faint)" text-anchor="middle">—</text>`; return; }
      out+= p.interp
        ? `<circle cx="${xat(i).toFixed(1)}" cy="${yv(p.yield).toFixed(1)}" r="3.2" fill="var(--panel)" stroke="${s.color}" stroke-width="1.5"/>`
        : `<circle cx="${xat(i).toFixed(1)}" cy="${yv(p.yield).toFixed(1)}" r="3" fill="${s.color}"/>`; });
  }
  out+=`</svg>`; return out;
}
function sensChart(rows){
  const W=350,H=150,pl=30,pr=30,pt=12,pb=20;
  const trs=rows.map(r=>r.tr), tmin=Math.min(...trs,0),tmax=Math.max(...trs,0);
  const cs=rows.map(r=>r.clean), cmin=Math.min(...cs),cmax=Math.max(...cs);
  const bw=(W-pl-pr)/rows.length;
  const zero=pt+(H-pt-pb)*(1-(0-tmin)/((tmax-tmin)||1));
  const yT=v=> pt+(H-pt-pb)*(1-(v-tmin)/((tmax-tmin)||1));
  const yC=v=> pt+(H-pt-pb)*(1-(v-cmin)/((cmax-cmin)||1));
  let out=`<svg viewBox="0 0 ${W} ${H}">`;
  out+=`<line x1="${pl}" y1="${zero}" x2="${W-pr}" y2="${zero}" stroke="var(--line)"/>`;
  rows.forEach((r,i)=>{ const x=pl+bw*i+bw*0.2, top=Math.min(yT(r.tr),zero), h=Math.abs(yT(r.tr)-zero);
    out+=`<rect x="${x.toFixed(1)}" y="${top.toFixed(1)}" width="${(bw*0.6).toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" fill="${r.bp===0?'var(--gold)':'#c9a22799'}"/>`;
    out+=`<text x="${(x+bw*0.3).toFixed(1)}" y="${H-6}" font-size="7" fill="var(--faint)" text-anchor="middle">${r.bp>0?"+":""}${r.bp}</text>`; });
  const dC=rows.map((r,i)=>`${i?"L":"M"}${(pl+bw*i+bw*0.5).toFixed(1)},${yC(r.clean).toFixed(1)}`).join("");
  out+=`<path d="${dC}" fill="none" stroke="var(--down)" stroke-width="1.5"/>`;
  out+=`</svg>`; return out;
}

    <div class="pill-row" style="font-size:9.5px">${badge("quote")}${badge("mtm")}${badge("actual")}${badge("interp")}</div>
    <div class="note" style="text-align:left">헤더(상단)와 첫 열(좌측)이 고정됩니다 · 가로·세로 스크롤 · 결측은 — · 통안채 30Y 결측(MISSING)</div>
    <div class="btnrow">
      <button class="btn" onclick="go('curve')">수익률곡선 비교</button>
      <button class="btn primary" onclick="go('simulation')">시뮬레이션 전달</button>
    </div>
  </div>`;
}

function scr_simulation(){
  const t=TERMS[state.bondId], m=MASTERS.find(x=>x.id===state.bondId);
  const aY=t.issueYield||t.couponRate||3;
  if(state.simB==null) state.simB=aY;
  const aDate=AS_OF; const bDate=(function(){ const d=new Date(pd(AS_OF)); d.setUTCFullYear(d.getUTCFullYear()+1); return d.toISOString().slice(0,10); })();
  const qty=100, taxRate=15.4;
  const r=simulate(t,aDate,aY,bDate,state.simB,qty,taxRate);
  const sens=sensitivity(t,aDate,aY,bDate,state.simB,qty,taxRate);
  return `
  <div class="stack">
    <div class="card"><div class="note" style="text-align:left;margin-bottom:4px">종목</div>
      <select onchange="setBond(this.value)" style="width:100%;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--chip);color:var(--text);padding:0 8px;font-size:13px">
        ${MASTERS.map(x=>`<option value="${x.id}" ${state.bondId===x.id?"selected":""}>${x.name}</option>`).join("")}
      </select>
      <div class="note" style="text-align:left;margin-top:4px">전달됨: ${m.cat} · 수익률출처 시가평가 · A수익률 ${fY(aY)}</div>
    </div>
    <div class="grid2">
      <div class="stat"><div class="l">A (취득/현재)</div><div class="v tnum" style="font-size:14px">${aDate}</div><div class="s">수익률 ${fY(aY)} · 100좌</div></div>
      <div class="stat" style="border-color:var(--gold)"><div class="l">B (처분/평가)</div><div class="v tnum" style="font-size:14px">${bDate}</div><div class="s">수익률 ${fY(state.simB)}</div></div>
    </div>
    <div class="card">
      <div class="note" style="text-align:left;display:flex;justify-content:space-between"><span>B 예상 시장수익률</span><b class="tnum" style="color:var(--gold)">${fY(state.simB)}</b></div>
      <input type="range" min="${(aY-2).toFixed(1)}" max="${(aY+2).toFixed(1)}" step="0.05" value="${state.simB}" oninput="setSimB(this.value)"/>
      <div class="note" style="display:flex;justify-content:space-between"><span>-200bp</span><span>기준 ${fY(aY)}</span><span>+200bp</span></div>
    </div>
    <div class="grid2">
      <div class="stat"><div class="l">초기투자금액</div><div class="v tnum" style="font-size:15px">${fM(r.invest)}</div><div class="s">A Dirty×수량</div></div>
      <div class="stat"><div class="l">총수익</div><div class="v big tnum ${r.profit>=0?'up':'down'}">${fM(r.profit)}</div><div class="s">Income+Capital−세</div></div>
      <div class="stat"><div class="l">Income Gain</div><div class="v tnum">${fM(r.income)}</div><div class="s">수취이자·상환</div></div>
      <div class="stat"><div class="l">Capital Gain</div><div class="v tnum">${fM(r.capital)}</div><div class="s">B−A Clean</div></div>
      <div class="stat"><div class="l">TR</div><div class="v tnum gold">${(r.tr*100).toFixed(3)}%</div><div class="s">보유 ${r.hold}일</div></div>
      <div class="stat"><div class="l">CAGR</div><div class="v tnum gold">${(r.cagr*100).toFixed(3)}%</div><div class="s">연환산 복리</div></div>
    </div>
    <div class="card">
      <div class="note" style="text-align:left;margin-bottom:4px"><b>민감도 −100bp ~ +100bp</b> (예상세액 세율 15.4% 사용자 설정)</div>
      ${sensChart(sens)}
      <div style="overflow-x:auto;margin-top:6px"><table class="data">
        <thead><tr><th>시나리오</th><th>B수익률</th><th>단가</th><th>Capital</th><th>TR%</th><th>CAGR%</th></tr></thead>
        <tbody>${sens.map(s=>`<tr style="${s.bp===0?'background:var(--amber-bg)':''}"><td>${s.bp>0?"+":""}${s.bp}bp</td><td class="tnum">${s.y.toFixed(3)}</td><td class="tnum">${fP(s.clean)}</td><td class="tnum">${fM(s.capital)}</td><td class="tnum">${s.tr.toFixed(3)}</td><td class="tnum">${s.cagr.toFixed(3)}</td></tr>`).join("")}</tbody>
      </table></div>
    </div>
    <details class="acc"><summary>현금흐름 · 할인과정 (A시점)</summary><div class="body" style="overflow-x:auto">
      <table class="data"><thead><tr><th>지급일</th><th>원리금</th><th>잔존연</th><th>할인계수</th><th>현가</th></tr></thead><tbody>
      ${r.A.cfs.slice(0,8).map(c=>`<tr><td>${c.date}</td><td class="tnum">${fP(c.total,2)}</td><td class="tnum">${c.t.toFixed(3)}</td><td class="tnum">${c.df.toFixed(5)}</td><td class="tnum">${fP(c.pv,2)}</td></tr>`).join("")}
      </tbody></table>
      <div class="grid2" style="margin-top:6px">${kv("A Clean",fP(r.A.clean))}${kv("B Clean",fP(r.B.clean))}${kv("A Dirty",fP(r.A.dirty))}${kv("B Dirty",fP(r.B.dirty))}${kv("A 경과이자",fP(r.A.accrued,2))}${kv("B 경과이자",fP(r.B.accrued,2))}</div>
    </div></details>
    <div class="note">세법은 자동 판정하지 않습니다. 세율·과세대상은 사용자 설정값(localStorage jbond.tax.v1)이며 재실행 시 복원됩니다.</div>
  </div>`;
}

/* ============================================================
   내비게이션 & 이벤트
   ============================================================ */
const SCREENS=[
  {k:"issue",label:"발행",title:"발행정보",ic:"📄",fn:scr_issue},
  {k:"curve",label:"곡선",title:"수익률곡선",ic:"📈",fn:scr_curve},
  {k:"distribution",label:"유통",title:"유통정보",ic:"🔁",fn:scr_distribution},
  {k:"simulation",label:"투자",title:"투자 시뮬레이션",ic:"🧮",fn:scr_simulation},
  {k:"mtm",label:"시가표",title:"시가평가표",ic:"🗂️",fn:scr_mtm},
];
function render(){
  const s=SCREENS.find(x=>x.k===state.screen);
  document.getElementById("viewport").innerHTML=s.fn();
  document.getElementById("viewport").scrollTop=0;
  document.getElementById("tbTitle").textContent=s.title;
  document.getElementById("bottomnav").innerHTML=SCREENS.map(x=>`<button class="${x.k===state.screen?'on':''}" onclick="go('${x.k}')"><span class="ic">${x.ic}</span>${x.label}</button>`).join("");
  document.getElementById("screenTabs").innerHTML=SCREENS.map(x=>`<button class="${x.k===state.screen?'on':''}" onclick="go('${x.k}')">${x.title}</button>`).join("");
}
function go(k){ state.screen=k; render(); }
function setPeriod(d){ state.period=d; render(); }
function setCurve(v){ state.curveId=v; render(); }
function setCurveMode(k){ state.curveMode=k; render(); }
function setCurveCmp(d){ state.curveCompare=d; render(); }
function toggleMtm(){ state.mtmBp=!state.mtmBp; render(); }
function setBond(id){ state.bondId=id; state.simB=null; render(); }
function setSimB(v){ state.simB=Number(v); render(); }
function toggleWatch(){ state.watched[state.bondId]=!state.watched[state.bondId]; render(); }
window.go=go;window.setPeriod=setPeriod;window.setCurve=setCurve;window.setCurveMode=setCurveMode;window.setCurveCmp=setCurveCmp;window.toggleMtm=toggleMtm;window.setBond=setBond;window.setSimB=setSimB;window.toggleWatch=toggleWatch;

// theme toggle
document.getElementById("themeBtn").onclick=function(){
  const root=document.documentElement;
  const cur=root.getAttribute("data-theme")|| (window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
  root.setAttribute("data-theme", cur==="dark"?"light":"dark");
};
render();
</script>
</body>
</html>
