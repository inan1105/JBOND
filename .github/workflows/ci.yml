name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Unit tests (bond-engine + web)
        run: npm run test

      - name: Build (typecheck + Vite PWA)
        run: npm run build

      - name: Install Playwright browsers
        # mobile-390 프로젝트가 iPhone 12(WebKit)를 사용하므로 chromium+webkit 모두 필요
        run: npx playwright install --with-deps chromium webkit

      - name: E2E (Playwright)
        run: npm run test:e2e

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          if-no-files-found: error
